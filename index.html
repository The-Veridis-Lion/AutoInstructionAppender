<div id="aia-modal-overlay"></div>
<div id="aia-modal">
  <div id="aia-modal-header">
    <div class="aia-modal-title">自动指令</div>
    <div class="aia-header-actions">
      <label class="aia-stealth-toggle" for="aia-stealth-mode">
        <input id="aia-stealth-mode" type="checkbox" />
        <span>隐身发送</span>
      </label>
      <button id="aia-modal-close" class="menu_button aia-btn">×</button>
    </div>
  </div>
  <div id="aia-add-row">
    <input
      id="aia-new-instruction"
      type="text"
      placeholder="在此输入新指令内容..."
      class="text_pole aia-new-input"
    />
    <button id="aia-add-btn" class="menu_button aia-btn">添加</button>
  </div>
  <div id="aia-list-wrap"></div>
</div>
